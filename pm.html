<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Meadows Eye — Maintenance Tracker</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"
      onerror="this.onerror=null;this.href='https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/iconfont/tabler-icons.min.css'"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap">

<style>
/* App-specific overrides (keep nav from styles.css, override body for fullscreen layout) */
body{overflow:hidden;font-size:14px}
.app{display:flex;flex-direction:column;height:calc(100vh - var(--nav-h))}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:calc(100vh - var(--nav-h));gap:16px;color:var(--text-3)}
.loading-spinner{width:36px;height:36px;border:3px solid var(--border-hover);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-status{font-size:13px;color:var(--text-3)}
.error-screen{display:flex;align-items:center;justify-content:center;height:calc(100vh - var(--nav-h));padding:20px}
.error-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:32px;max-width:480px;width:100%;text-align:center}
.error-card i{font-size:40px;color:var(--red);display:block;margin-bottom:12px}
.error-card h2{font-size:18px;font-weight:600;margin-bottom:8px}
.error-card p{font-size:13px;color:var(--text-3);line-height:1.6;margin-bottom:16px}
.error-card button{background:var(--blue);color:#fff;border:none;padding:9px 20px;border-radius:var(--radius);font-size:13px;cursor:pointer;font-family:inherit;font-weight:600}
/* Passcode */
.lock-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:calc(100vh - var(--nav-h));background:var(--page);gap:0}
.lock-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:36px 32px 28px;width:320px;box-shadow:0 20px 60px rgba(0,0,0,.6);text-align:center}
.lock-icon{width:56px;height:56px;background:var(--blue-dim);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;border:1px solid var(--border-hover)}
.lock-icon i{font-size:26px;color:var(--blue)}
.lock-title{font-size:17px;font-weight:600;margin-bottom:4px}
.lock-subtitle{font-size:12px;color:var(--text-3);margin-bottom:24px}
.lock-dots{display:flex;justify-content:center;gap:12px;margin-bottom:28px;height:14px}
.lock-dot{width:12px;height:12px;border-radius:50%;border:2px solid var(--border-hover);background:transparent;transition:all .15s}
.lock-dot.filled{background:var(--blue);border-color:var(--blue);transform:scale(1.1)}
.lock-dot.error{background:var(--red);border-color:var(--red)}
.lock-numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.lock-key{background:var(--raised);border:1px solid var(--border-hover);color:var(--text-1);border-radius:var(--radius);padding:14px 10px;font-size:18px;font-weight:600;cursor:pointer;transition:all .12s;font-family:inherit;user-select:none}
.lock-key:hover{background:var(--surface-alt);border-color:var(--blue);color:var(--blue)}
.lock-key:active{transform:scale(.94)}
.lock-key.clear{font-size:13px;color:var(--text-3);font-weight:500}
.lock-key.clear:hover{color:var(--red);border-color:var(--red);background:var(--red-dim)}
.lock-key.empty{visibility:hidden;cursor:default}
.lock-key.empty:hover{background:var(--raised);border-color:var(--border-hover)}
.lock-err{font-size:12px;color:var(--red-text);min-height:18px;margin-top:2px}
.lock-shake{animation:shake .4s ease}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
/* Header */
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 18px;display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap}
.header-logo{display:flex;align-items:center;gap:9px;font-size:14px;font-weight:600}
.header-logo i{font-size:18px;color:var(--blue)}
.header-badges{display:flex;gap:6px;flex-wrap:wrap}
.header-actions{margin-left:auto;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.header-divider{width:1px;height:22px;background:var(--border);margin:0 2px}
.sync-indicator{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:500;padding:4px 10px;border-radius:20px;background:var(--raised);border:1px solid var(--border-hover)}
.sync-dot{width:7px;height:7px;border-radius:50%}
.sync-dot.live{background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 2s infinite}
.sync-dot.saving{background:var(--amber);animation:pulse .6s infinite}
.sync-dot.offline{background:var(--red)}
.sync-dot.setup{background:var(--text-3)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
/* Layout */
.main{display:flex;flex:1;overflow:hidden}
.sidebar{width:222px;min-width:222px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-label{padding:10px 14px 6px;font-size:10px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.1em;border-bottom:1px solid var(--border);flex-shrink:0}
.sidebar-list{flex:1;overflow-y:auto}
.sidebar-list::-webkit-scrollbar{width:4px}
.sidebar-list::-webkit-scrollbar-thumb{background:var(--border-hover);border-radius:4px}
.office-item{padding:9px 14px;cursor:pointer;border-left:3px solid transparent;display:flex;align-items:center;gap:7px;font-size:13px;transition:background .12s;color:var(--text-2)}
.office-item:hover{background:var(--surface-alt);color:var(--text-1)}
.office-item:hover .office-edit-btn{opacity:1}
.office-item.active{background:var(--raised);border-left-color:var(--blue);color:var(--text-1);font-weight:500}
.office-name-wrap{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.office-edit-btn{background:none;border:none;cursor:pointer;color:var(--text-3);font-size:13px;opacity:0;padding:2px 4px;border-radius:4px;line-height:1;transition:opacity .15s}
.office-edit-btn:hover{background:var(--border-hover);color:var(--text-1)}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot-red{background:var(--red)}.dot-amber{background:var(--amber)}.dot-green{background:var(--green)}.dot-gray{background:var(--text-3)}
.sidebar-footer{padding:10px 12px;border-top:1px solid var(--border);flex-shrink:0}
.content{flex:1;overflow-y:auto;padding:22px 24px;background:var(--page)}
.content::-webkit-scrollbar{width:5px}
.content::-webkit-scrollbar-thumb{background:var(--border-hover);border-radius:4px}
.office-header{display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap}
.office-title{font-size:18px;font-weight:600;display:flex;align-items:center;gap:9px}
.office-title i{font-size:18px;color:var(--blue)}
.office-header-actions{margin-left:auto;display:flex;gap:8px}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px}
.stat-label{font-size:11px;color:var(--text-3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em;font-weight:500}
.stat-value{font-size:24px;font-weight:600}
.task-table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
table{width:100%;border-collapse:collapse;table-layout:fixed}
th{font-size:10px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.09em;padding:9px 13px;border-bottom:1px solid var(--border);text-align:left;background:var(--surface-alt);position:static}
td{padding:9px 13px;border-bottom:1px solid var(--border);vertical-align:middle;font-size:13px}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface-alt)}
.col-name{width:28%}.col-cat{width:11%}.col-freq{width:10%}.col-last{width:13%}.col-next{width:13%}.col-status{width:14%}.col-act{width:11%}
.task-name{font-weight:500;font-size:13px;margin-bottom:2px}
.task-notes{font-size:11px;color:var(--text-3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500;white-space:nowrap}
.pill-red{background:var(--red-dim);color:var(--red-text)}
.pill-amber{background:var(--amber-dim);color:var(--amber-text)}
.pill-green{background:var(--green-dim);color:var(--green-text)}
.pill-gray{background:var(--raised);color:var(--text-3)}
.pill-blue{background:var(--blue-dim);color:var(--blue-text)}
.row-actions{display:flex;gap:4px;align-items:center}
.icon-btn{background:none;border:1px solid transparent;cursor:pointer;color:var(--text-3);padding:4px 6px;border-radius:6px;font-size:15px;line-height:1;transition:all .12s}
.icon-btn:hover{background:var(--raised);border-color:var(--border-hover);color:var(--text-1)}
.done-btn:hover{background:var(--green-dim)!important;color:var(--green)!important;border-color:var(--green-dim)!important}
.del-btn:hover{background:var(--red-dim)!important;color:var(--red)!important;border-color:var(--red-dim)!important}
.section-divider{padding:6px 13px;font-size:10px;font-weight:600;color:var(--text-3);background:var(--surface-alt);border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.09em}
.freq-cell{display:flex;align-items:center;gap:5px}
.freq-input{width:56px;padding:3px 7px;border:1px solid var(--border-hover);border-radius:6px;font-size:12px;font-family:inherit;background:var(--raised);color:var(--text-1)}
.freq-input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 2px var(--blue-dim)}
.freq-unit{font-size:11px;color:var(--text-3)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(3px)}
.modal{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);padding:24px;width:450px;max-width:96vw;max-height:92vh;overflow-y:auto;box-shadow:0 16px 60px rgba(0,0,0,.6)}
.modal::-webkit-scrollbar{width:4px}
.modal::-webkit-scrollbar-thumb{background:var(--border-hover);border-radius:4px}
.modal-title{font-size:16px;font-weight:600;margin-bottom:18px;display:flex;align-items:center;gap:9px}
.modal-title i{color:var(--blue);font-size:18px}
.form-group{margin-bottom:14px}
.form-label{font-size:12px;font-weight:500;color:var(--text-2);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.03em}
.form-input{width:100%;padding:8px 11px;border:1px solid var(--border-hover);border-radius:var(--radius);font-size:13px;font-family:inherit;background:var(--raised);color:var(--text-1)}
.form-input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-dim)}
textarea.form-input{resize:vertical}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;padding-top:14px;border-top:1px solid var(--border)}
.err-msg{color:var(--red-text);font-size:12px;margin-bottom:10px;padding:8px 11px;background:var(--red-dim);border-radius:var(--radius);border:1px solid rgba(239,107,107,.15)}
.hint{font-size:11px;color:var(--text-3);margin-top:4px;line-height:1.4}
.inline-edit{border:1px solid var(--blue);border-radius:6px;padding:3px 8px;font-size:13px;font-family:inherit;background:var(--raised);color:var(--text-1);width:130px}
.inline-edit:focus{outline:none;box-shadow:0 0 0 2px var(--blue-dim)}
.empty{text-align:center;padding:60px 20px;color:var(--text-3)}
.empty i{font-size:44px;display:block;margin-bottom:12px;opacity:.2}
.toast{position:fixed;bottom:24px;right:24px;background:var(--raised);color:var(--text-1);padding:11px 18px;border-radius:var(--radius);font-size:13px;z-index:999;box-shadow:0 4px 24px rgba(0,0,0,.5);display:flex;align-items:center;gap:9px;border:1px solid var(--border-hover);animation:fadeIn .2s ease;font-weight:500}
.toast.success{background:var(--green-dim);color:var(--green-text);border-color:rgba(62,207,110,.2)}
.toast.error{background:var(--red-dim);color:var(--red-text);border-color:rgba(244,91,91,.2)}
@keyframes fadeIn{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
/* Setup screen */
.setup-screen{display:flex;align-items:center;justify-content:center;flex:1;padding:20px}
.setup-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:32px;max-width:580px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,.5)}
.setup-title{font-size:20px;font-weight:600;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.setup-title i{color:var(--blue);font-size:22px}
.setup-subtitle{font-size:13px;color:var(--text-3);margin-bottom:24px;line-height:1.6}
.setup-steps{margin-bottom:24px}
.setup-step{display:flex;gap:14px;margin-bottom:18px;align-items:flex-start}
.step-num{background:var(--blue-dim);color:var(--blue-text);border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;margin-top:1px}
.step-body{flex:1}
.step-title{font-size:13px;font-weight:500;margin-bottom:3px}
.step-desc{font-size:12px;color:var(--text-3);line-height:1.6}
.step-desc a{color:var(--blue);text-decoration:none}
.step-desc a:hover{text-decoration:underline}
.step-desc code{background:var(--raised);padding:1px 5px;border-radius:4px;font-size:11px;color:var(--blue-text)}
.config-area{background:var(--raised);border:1px solid var(--border-hover);border-radius:var(--radius);padding:14px;margin-top:8px}
.config-area textarea{width:100%;background:transparent;border:none;color:var(--text-1);font-family:'Courier New',monospace;font-size:12px;resize:vertical;min-height:160px;line-height:1.5}
.config-area textarea:focus{outline:none}
.config-area textarea::placeholder{color:var(--text-3)}
.setup-err{color:var(--red-text);font-size:12px;padding:8px 11px;background:var(--red-dim);border-radius:var(--radius);border:1px solid rgba(244,91,91,.15);margin-bottom:12px}
.setup-footer{display:flex;justify-content:flex-end;gap:8px}
/* Btn overrides for this page */
.btn-export{background:var(--green-dim);color:var(--green-text);border-color:rgba(62,207,110,.2)}
.btn-export:hover{opacity:.85}
.btn-import{background:var(--purple-dim);color:#b8a3fd;border-color:rgba(139,108,247,.2)}
.btn-import:hover{opacity:.85}
.btn-danger{background:var(--red-dim);color:var(--red-text);border-color:rgba(244,91,91,.15)}
.btn-danger:hover{opacity:.85}
.btn-block{width:100%;justify-content:center}
</style>
</head>

<script>

<script>
